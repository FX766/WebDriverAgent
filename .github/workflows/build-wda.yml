name: Build WDA for iOS Real Device

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-real-device:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Build WDA for iOS Real Device
        run: |
          ./Scripts/bootstrap.sh
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR=build/Debug-iphoneos
      
      - name: Upload WDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Runner
          path: build/Debug-iphoneos/WebDriverAgentRunner-Runner.app
          retention-days: 1
